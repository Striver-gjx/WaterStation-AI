appId: com.waterstation.desktop
productName: "水站管理系统"
directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - frontend/**/*

extraResources:
  - from: ./extraResources/backend/
    to: backend/
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"
  extraResources:
    - from: ./extraResources/jre-win-x64/
      to: jre/
      filter:
        - "**/*"

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: resources/icon.icns
  category: public.app-category.business
  artifactName: "${productName}-${version}-mac.${ext}"
  extraResources:
    - from: ./extraResources/jre/
      to: jre/
      filter:
        - "**/*"

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "水站管理系统"

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
