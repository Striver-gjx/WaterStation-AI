appId: com.waterstation.desktop
productName: "WaterStation"
directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - frontend/**/*

extraResources:
  - from: ./extraResources/backend/
    to: backend/
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "WaterStation-Setup-${version}.${ext}"
  extraResources:
    - from: ./extraResources/jre-win-x64/
      to: jre/
      filter:
        - "**/*"

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: resources/icon.icns
  category: public.app-category.business
  artifactName: "${productName}-${version}-mac.${ext}"
  identity: null
  extraResources:
    - from: ./extraResources/jre/
      to: jre/
      filter:
        - "**/*"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "WaterStation"
  unicode: true
  include: build/installer.nsh
  perMachine: true

dmg:
  backgroundColor: "#ffffff"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
