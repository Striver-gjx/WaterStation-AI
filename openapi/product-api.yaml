openapi: 3.0.3
info:
  title: WaterStation AI - Product & Inventory API
  version: 1.0.0
  description: 产品和库存管理模块接口

paths:
  /api/v1/products:
    get:
      summary: 产品列表
      operationId: listProducts
      tags: [Product]
      parameters:
        - name: category
          in: query
          schema: { type: string, enum: [water, dispenser, accessory] }
        - name: status
          in: query
          schema: { type: string, enum: [IN_STOCK, LOW_STOCK, OUT_OF_STOCK, DISCONTINUED] }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultProductList'
    post:
      summary: 新增产品
      operationId: createProduct
      tags: [Product]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateDTO'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultProductVO'

  /api/v1/products/{id}:
    get:
      summary: 产品详情
      operationId: getProduct
      tags: [Product]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultProductVO'
    put:
      summary: 更新产品
      operationId: updateProduct
      tags: [Product]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateDTO'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'
    delete:
      summary: 删除产品
      operationId: deleteProduct
      tags: [Product]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'

  /api/v1/products/{id}/stock:
    put:
      summary: 调整库存
      operationId: adjustStock
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [changeType, quantity]
              properties:
                changeType:
                  type: string
                  enum: [IN, OUT, ADJUST]
                quantity:
                  type: integer
                  description: 变动数量（正数）
                remark:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'

  /api/v1/inventory/logs:
    get:
      summary: 库存变动记录
      operationId: listInventoryLogs
      tags: [Inventory]
      parameters:
        - name: productId
          in: query
          schema: { type: integer, format: int64 }
        - name: changeType
          in: query
          schema: { type: string, enum: [IN, OUT, ADJUST] }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResultInventoryLog'

components:
  schemas:
    ResultVoid:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data: {}

    ResultProductVO:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          $ref: '#/components/schemas/ProductVO'

    ResultProductList:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductVO'

    PageResultInventoryLog:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          type: object
          properties:
            total: { type: integer, format: int64 }
            list:
              type: array
              items:
                $ref: '#/components/schemas/InventoryLogVO'

    ProductVO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        category: { type: string }
        specification: { type: string }
        unitPrice: { type: number, format: double }
        stock: { type: integer }
        maxStock: { type: integer }
        minStockAlert: { type: integer }
        status: { type: string }
        imageUrl: { type: string }
        description: { type: string }
        sortOrder: { type: integer }

    InventoryLogVO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        productId: { type: integer, format: int64 }
        productName: { type: string }
        changeType: { type: string }
        quantity: { type: integer }
        beforeStock: { type: integer }
        afterStock: { type: integer }
        referenceType: { type: string }
        operator: { type: string }
        remark: { type: string }
        createdAt: { type: string, format: date-time }

    ProductCreateDTO:
      type: object
      required: [name, unitPrice]
      properties:
        name: { type: string, maxLength: 200 }
        category: { type: string, enum: [water, dispenser, accessory], default: water }
        specification: { type: string }
        unitPrice: { type: number, format: double }
        costPrice: { type: number, format: double }
        stock: { type: integer, default: 0 }
        maxStock: { type: integer, default: 1000 }
        minStockAlert: { type: integer, default: 50 }
        imageUrl: { type: string }
        description: { type: string }

    ProductUpdateDTO:
      type: object
      properties:
        name: { type: string }
        category: { type: string }
        specification: { type: string }
        unitPrice: { type: number, format: double }
        costPrice: { type: number, format: double }
        maxStock: { type: integer }
        minStockAlert: { type: integer }
        imageUrl: { type: string }
        description: { type: string }
        sortOrder: { type: integer }
