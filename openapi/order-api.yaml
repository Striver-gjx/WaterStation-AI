openapi: 3.0.3
info:
  title: WaterStation AI - Order API
  version: 1.0.0
  description: 订单管理模块接口

paths:
  /api/v1/orders:
    get:
      summary: 订单列表
      operationId: listOrders
      tags: [Order]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string, enum: [DRAFT, PENDING_PAYMENT, PAID, WAITING_DISPATCH, DISPATCHING, DELIVERED, COMPLETED, CANCELLED] }
        - name: customerId
          in: query
          schema: { type: integer, format: int64 }
        - name: driverId
          in: query
          schema: { type: integer, format: int64 }
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResultOrderVO'
    post:
      summary: 创建订单
      operationId: createOrder
      tags: [Order]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateDTO'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultOrderVO'

  /api/v1/orders/{id}:
    get:
      summary: 订单详情
      operationId: getOrder
      tags: [Order]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultOrderDetailVO'
    delete:
      summary: 删除订单
      operationId: deleteOrder
      tags: [Order]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'

  /api/v1/orders/{id}/status:
    put:
      summary: 更新订单状态
      operationId: updateOrderStatus
      tags: [Order]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [DRAFT, PENDING_PAYMENT, PAID, WAITING_DISPATCH, DISPATCHING, DELIVERED, COMPLETED, CANCELLED, REFUNDING, REFUNDED]
                cancelReason:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'

  /api/v1/orders/{id}/dispatch:
    post:
      summary: 派单（分配配送员）
      operationId: dispatchOrder
      tags: [Order]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [driverId]
              properties:
                driverId:
                  type: integer
                  format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'

  /api/v1/orders/{id}/pay:
    post:
      summary: 订单支付
      operationId: payOrder
      tags: [Order]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentMethod, amount]
              properties:
                paymentMethod:
                  type: string
                  enum: [WECHAT, CASH, TICKET, MONTHLY, CREDIT_CARD]
                amount:
                  type: number
                  format: double
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'

components:
  schemas:
    ResultVoid:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data: {}

    ResultOrderVO:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          $ref: '#/components/schemas/OrderVO'

    ResultOrderDetailVO:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          $ref: '#/components/schemas/OrderDetailVO'

    PageResultOrderVO:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          type: object
          properties:
            total: { type: integer, format: int64 }
            list:
              type: array
              items:
                $ref: '#/components/schemas/OrderVO'

    OrderVO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        orderNo: { type: string }
        customerId: { type: integer, format: int64 }
        customerName: { type: string }
        driverId: { type: integer, format: int64 }
        driverName: { type: string }
        totalAmount: { type: number, format: double }
        status: { type: string }
        paymentMethod: { type: string }
        deliveryAddress: { type: string }
        scheduledDate: { type: string, format: date }
        scheduledTimeSlot: { type: string }
        createdAt: { type: string, format: date-time }

    OrderDetailVO:
      allOf:
        - $ref: '#/components/schemas/OrderVO'
        - type: object
          properties:
            paidAmount: { type: number, format: double }
            remark: { type: string }
            cancelReason: { type: string }
            completedAt: { type: string, format: date-time }
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderItemVO'
            delivery:
              $ref: '#/components/schemas/DeliveryVO'

    OrderItemVO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        productId: { type: integer, format: int64 }
        productName: { type: string }
        unitPrice: { type: number, format: double }
        quantity: { type: integer }
        subtotal: { type: number, format: double }

    DeliveryVO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        status: { type: string }
        driverName: { type: string }
        pickupTime: { type: string, format: date-time }
        deliveredTime: { type: string, format: date-time }
        emptyBucketsCollected: { type: integer }
        customerSigned: { type: boolean }

    OrderCreateDTO:
      type: object
      required: [customerId, deliveryAddress, items]
      properties:
        customerId:
          type: integer
          format: int64
        deliveryAddress:
          type: string
        scheduledDate:
          type: string
          format: date
        scheduledTimeSlot:
          type: string
        remark:
          type: string
        paymentMethod:
          type: string
          enum: [WECHAT, CASH, TICKET, MONTHLY, CREDIT_CARD]
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId: { type: integer, format: int64 }
              quantity: { type: integer, minimum: 1 }
